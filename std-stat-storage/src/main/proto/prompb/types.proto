syntax = "proto3";

package prometheus;

option java_multiple_files = true;
option java_package = "prometheus";

message Sample {
  double value = 1;
  int64 timestamp = 2;
}

message Label {
  string name = 1;
  string value = 2;
}

message TimeSeries {
  repeated Label labels = 1;
  repeated Sample samples = 2;
}
